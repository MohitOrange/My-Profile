<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Random Joke Generator</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            flex-direction: column;\n            height: 100vh;\n            background-color: #f4f4f4;\n        }\n        #joke {\n            margin: 20px;\n            padding: 20px;\n            border: 1px solid #ccc;\n            border-radius: 5px;\n            background-color: #fff;\n            text-align: center;\n        }\n        button {\n            padding: 10px 20px;\n            font-size: 16px;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n            background-color: #007bff;\n            color: white;\n        }\n    </style>\n</head>\n<body>\n    <div id='joke'>Click the button to get a random joke!</div>\n    <button id='jokeBtn'>Get Joke</button>\n    <script>\n        document.getElementById('jokeBtn').addEventListener('click', getJoke);\n\n        function getJoke() {\n            fetch('https://v2.jokeapi.dev/joke/Any')\n                .then(response => response.json())\n                .then(data => {\n                    const jokeDiv = document.getElementById('joke');\n                    if (data.joke) {\n                        jokeDiv.innerHTML = data.joke;\n                    } else {\n                        jokeDiv.innerHTML = data.setup + ' - ' + data.delivery;\n                    }\n                })\n                .catch(err => {\n                    console.error('Error fetching joke:', err);\n                    document.getElementById('joke').innerHTML = 'Failed to fetch a joke.';\n                });\n        }\n    <\/script>\n</body>\n</html>
